<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión — La Inconclusa</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#08080a;--border:rgba(255,255,255,.1);--border2:rgba(217,169,60,.35);--text:#ECECEF;--muted:#9a9aa6;--gold:#D9A93C;--gold2:#f0c75e}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(700px circle at 70% -10%,rgba(217,169,60,.1),transparent 50%)}
  nav{padding:16px 24px;border-bottom:1px solid var(--border)}
  .brand{font-family:'Space Grotesk';font-weight:700;display:flex;align-items:center;gap:9px;color:var(--text);text-decoration:none;font-size:1.05rem}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--gold2),var(--gold));box-shadow:0 0 12px var(--gold)}
  main{flex:1;display:grid;place-items:center;padding:30px 20px}
  .card{width:100%;max-width:400px;background:rgba(14,14,18,.7);border:1px solid var(--border);border-radius:18px;padding:34px 30px;backdrop-filter:blur(8px)}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:1.6rem;margin-bottom:6px}
  .sub{color:var(--muted);font-size:.92rem;margin-bottom:8px}
  label{display:block;font-size:.85rem;color:var(--muted);margin:14px 0 6px}
  input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);font-size:1rem;font-family:inherit}
  input:focus{outline:none;border-color:var(--border2)}
  button{width:100%;margin-top:22px;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#1a1404;font-weight:700;font-size:1rem;cursor:pointer;font-family:inherit}
  button:hover{filter:brightness(1.05)} button:disabled{opacity:.6;cursor:wait}
  .alt{margin-top:18px;text-align:center;font-size:.9rem;color:var(--muted)} .alt a{color:var(--gold2);text-decoration:none}
  .msg{margin-top:16px;padding:11px 14px;border-radius:10px;font-size:.9rem;display:none;line-height:1.4}
  .msg.err{display:block;background:rgba(224,106,90,.12);border:1px solid rgba(224,106,90,.4);color:#f0a89c}
</style>
</head>
<body>
<nav><a class="brand" href="/"><span class="dot"></span> La Inconclusa</a></nav>
<main>
  <form class="card" id="f">
    <h1>Iniciar sesión</h1>
    <p class="sub">Bienvenido de vuelta.</p>
    <label for="email">Correo</label>
    <input id="email" name="email" type="email" required autocomplete="email" placeholder="tu@correo.com">
    <label for="password">Contraseña</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button id="btn" type="submit">Entrar</button>
    <div class="msg" id="msg"></div>
    <p class="alt">¿No tienes cuenta? <a href="/registro">Regístrate</a></p>
  </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL="https://mttohgmueztahyxuubkp.supabase.co";
  const SB_KEY="sb_publishable_Rv8jOya7UmX1l1pu_mWgfA_EM4x4tBW";
  const sb=supabase.createClient(SB_URL,SB_KEY);
  const f=document.getElementById('f'),msg=document.getElementById('msg'),btn=document.getElementById('btn');
  sb.auth.getSession().then(({data})=>{if(data.session)location.href='/cuenta';});
  function show(t,m){msg.className='msg '+t;msg.textContent=m;}
  f.addEventListener('submit',async e=>{
    e.preventDefault();msg.className='msg';
    btn.disabled=true;btn.textContent='Entrando...';
    const {data,error}=await sb.auth.signInWithPassword({email:f.email.value.trim(),password:f.password.value});
    btn.disabled=false;btn.textContent='Entrar';
    if(error){return show('err',error.message==='Invalid login credentials'?'Correo o contraseña incorrectos (o falta confirmar tu correo).':error.message);}
    location.href='/cuenta';
  });
</script>
</body>
</html>
