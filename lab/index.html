<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paxel80 · Laboratorio de Decisiones</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            navy: { 900: '#0a0f1a', 800: '#0f172a', 700: '#1e293b', 600: '#334155' },
            gold: { 400: '#f59e0b', 500: '#d97706', 600: '#b45309' },
            teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
            risk: { green: '#22c55e', yellow: '#eab308', orange: '#f97316', red: '#ef4444' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
</head>
<body class="bg-navy-900 text-gray-100 font-sans antialiased">

<div id="app" class="flex h-screen overflow-hidden">

  <!-- ======= SIDEBAR (desktop) ======= -->
  <aside id="sidebar" class="hidden lg:flex flex-col w-64 bg-navy-800 border-r border-navy-700 flex-shrink-0">
    <div class="p-4 border-b border-navy-700">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded bg-gold-500 flex items-center justify-center font-bold text-navy-900 text-sm">P80</div>
        <div>
          <div class="font-semibold text-sm text-gold-500">Laboratorio</div>
          <div class="text-xs text-gray-400">Decisiones</div>
        </div>
      </div>
    </div>
    <div class="demo-badge">
      <span class="inline-flex items-center gap-1 text-xs bg-yellow-900/40 text-yellow-400 px-2 py-0.5 rounded border border-yellow-700/50">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        MODO DEMO
      </span>
    </div>
    <nav id="sidebar-nav" class="flex-1 overflow-y-auto py-3 space-y-0.5 px-2"></nav>
    <div class="p-3 border-t border-navy-700">
      <div class="text-xs text-gray-500">v1.0 · 10 jul 2026</div>
    </div>
  </aside>

  <!-- ======= MOBILE BOTTOM NAV ======= -->
  <nav id="bottom-nav" class="lg:hidden fixed bottom-0 left-0 right-0 bg-navy-800 border-t border-navy-700 z-50 flex overflow-x-auto"></nav>

  <!-- ======= MAIN CONTENT ======= -->
  <main id="main-content" class="flex-1 flex flex-col overflow-hidden">
    <header id="page-header" class="flex-shrink-0 border-b border-navy-700 bg-navy-800/80 backdrop-blur"></header>
    <div id="page-content" class="flex-1 overflow-y-auto p-4 lg:p-6"></div>
  </main>

</div>

<!-- Modal backdrop -->
<div id="modal-backdrop" class="fixed inset-0 bg-black/60 z-40 hidden" onclick="closeModal()"></div>
<div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4"></div>

<script src="router.js"></script>
<script src="store.js"></script>
<script src="scoring.js"></script>
<script src="financial.js"></script>
<script src="pages.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => router.init());
</script>
</body>
</html>
